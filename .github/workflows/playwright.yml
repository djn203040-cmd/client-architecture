name: Playwright E2E

on:
  push:
  pull_request:

jobs:
  e2e:
    name: E2E test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: supabase/setup-cli@v3
        with:
          version: 2.108.0

      - name: Start local Supabase
        run: supabase start

      - name: Export Supabase keys to .env.test
        # Strip the surrounding quotes `supabase status -o env` adds (KEY="value")
        # so the loaded env vars are valid URLs, not `"http://…"`.
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_ANON_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            | sed -E 's/="(.*)"$/=\1/' >> apps/web/.env.test

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm --filter web test:e2e
        env:
          # External service stubs — real APIs never called in tests
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-client-secret
          RESEND_API_KEY: test-resend-key
          SLACK_SIGNING_SECRET: test-slack-secret
          TWILIO_AUTH_TOKEN: test-twilio-token
          ANTHROPIC_API_KEY: test-anthropic-key
          INNGEST_SIGNING_KEY: test-inngest-key
          INNGEST_EVENT_KEY: test-inngest-event-key
          # No Inngest dev server in CI — make event emission a no-op so
          # event-emitting routes don't 401→500 against Inngest Cloud.
          INNGEST_TEST_NOOP: "1"
          # Token-signing secrets — tests sign tokens the routes must verify.
          UNSUBSCRIBE_SECRET: test-unsub-secret
          JWT_REVIEW_SECRET: test-review-secret

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
