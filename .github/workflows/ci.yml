name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-grep:
    name: Security grep checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block NEXT_PUBLIC_ on service role key (INFRA-002)
        run: |
          if grep -rn "NEXT_PUBLIC_[A-Z_]*SERVICE_ROLE\|NEXT_PUBLIC_[A-Z_]*service_role" \
              --include="*.ts" --include="*.tsx" --include="*.env*" \
              --exclude-dir=node_modules --exclude-dir=.next \
              .; then
            echo "FAIL: Service role key prefixed with NEXT_PUBLIC_ — security violation"
            exit 1
          fi
      - name: Block port 5432 in env files (INFRA-004)
        run: |
          if grep -rn ":5432" .env.example 2>/dev/null; then
            echo "FAIL: DATABASE_URL must use Supavisor port 6543 (transaction mode), not 5432"
            exit 1
          fi

  type-check:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with: { version: 9.15.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web type-check

  lint:
    name: ESLint (no-console enforcement)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with: { version: 9.15.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint

  unit-tests:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with: { version: 9.15.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web vitest run

  build:
    name: Next.js build + ai-engine bundle audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with: { version: 9.15.4 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
      - name: Verify ai-engine absent from client bundle (INFRA-008, T-1-01)
        run: |
          if grep -rE "@client/ai-engine|client-architecture-ai-engine" apps/web/.next/static/ 2>/dev/null; then
            echo "FAIL: ai-engine code leaked to client bundle"
            exit 1
          fi
          echo "PASS: ai-engine clean"
