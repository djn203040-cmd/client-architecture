name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly OWASP ZAP baseline scan (Mondays 06:00 UTC)
    - cron: "0 6 * * 1"
  # Manual trigger to run the full scheduled scan (incl. the weekly ZAP
  # baseline) on demand, without waiting for the Monday cron.
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # Fail on any finding (working tree + history).
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  audit:
    name: pnpm audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit production deps (block high/critical)
        run: pnpm audit --prod --audit-level=high

  bundle-secret-leak:
    name: Client bundle secret leak check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build web app
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
      - name: Verify no server secrets reachable from client bundle
        run: |
          set -e
          LEAKED=0
          for needle in "SUPABASE_SERVICE_ROLE_KEY" "ANTHROPIC_API_KEY" "TWILIO_AUTH_TOKEN" "RESEND_API_KEY" "SLACK_SIGNING_SECRET" "INNGEST_SIGNING_KEY" "UPSTASH_REDIS_REST_TOKEN" "GOOGLE_CLIENT_SECRET" "JWT_REVIEW_SECRET" "UNSUBSCRIBE_SECRET" "CRON_SECRET" "FIREFLIES_API_KEY" "ZOOM_WEBHOOK_SECRET_TOKEN"; do
            if grep -rE "$needle" apps/web/.next/static 2>/dev/null; then
              echo "FAIL: $needle reachable from client bundle"
              LEAKED=1
            fi
          done
          if [ "$LEAKED" = "1" ]; then exit 1; fi
          echo "PASS: no server secrets in client bundle"

  security-tests:
    name: Security integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run security test suite
        run: pnpm --filter web vitest run --dir apps/web/tests/security
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder

  zap-baseline:
    name: OWASP ZAP baseline scan (weekly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve and reachability-check the scan target
        id: target
        run: |
          set -e
          TARGET="${{ vars.ZAP_TARGET_URL || 'https://client-architecture-one.vercel.app' }}"
          echo "url=$TARGET" >> "$GITHUB_OUTPUT"
          HOST="$(printf '%s' "$TARGET" | sed -E 's#^https?://##; s#/.*$##; s#:.*$##')"
          echo "Target: $TARGET (host: $HOST)"
          # Skip cleanly (job stays green) if the target is unresolvable/unreachable —
          # e.g. no deployed environment yet. A weekly DAST scan should never red the
          # whole Security workflow just because the target happens to be down.
          if ! getent hosts "$HOST" >/dev/null 2>&1; then
            echo "::warning::ZAP target host '$HOST' does not resolve — skipping DAST scan."
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CODE="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "$TARGET" || echo 000)"
          echo "HTTP status: $CODE"
          if [ "$CODE" = "000" ]; then
            echo "::warning::ZAP target '$TARGET' is unreachable (curl failed) — skipping DAST scan."
            echo "reachable=false" >> "$GITHUB_OUTPUT"
          else
            echo "reachable=true" >> "$GITHUB_OUTPUT"
          fi
      - name: ZAP baseline scan
        if: steps.target.outputs.reachable == 'true'
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ steps.target.outputs.url }}
          fail_action: false
          allow_issue_writing: false
          cmd_options: "-a"
