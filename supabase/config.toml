# Local-only Supabase config. Production schema deploys via `supabase db push --linked`.

[api]
enabled = true
port = 54321
schemas = ["public", "private"]
extra_search_path = ["public", "extensions"]
max_rows = 1000
# Supabase CLI v2.106.0 flipped this default to false: local start/reset now
# REVOKEs the Data API grants (anon/authenticated/service_role) for tables not
# explicitly granted, breaking every PostgREST-backed integration test
# ("permission denied for table leads"). Our migrations grant EXECUTE on RPCs
# but rely on the legacy auto-expose for table grants. Restore that behavior.
# DEPRECATED — removed 2026-10-30. Durable fix tracked in a follow-up issue:
# add explicit GRANTs per public table/sequence in migrations before then.
auto_expose_new_tables = true

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Enabled so integration tests can sign in admin-created coach users. This is
# the local/CI stack only (see file header); the hosted project keeps public
# signup off via dashboard settings.
enable_signup = true
minimum_password_length = 8

[auth.email]
# Email provider enabled so password sign-in works for test users on the
# local/CI stack. `enable_signup = false` here disables the email provider's
# login entirely ("Email logins are disabled"), which the RLS integration test
# depends on. enable_confirmations stays false so no email round-trip is needed.
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
